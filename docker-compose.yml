services:
  postgres:
    image: postgres
    container_name: my-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=supersecret123
      - POSTGRES_DB=minitwitter
    volumes:
      - ./docker-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  minitwitter-1:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:supersecret123@postgres:5432/minitwitter
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
      - SERVER_ROLE=api
      - ENABLE_RATE_LIMIT=false
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  minitwitter-2:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:supersecret123@postgres:5432/minitwitter
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
      - SERVER_ROLE=api
      - ENABLE_RATE_LIMIT=false
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  load-balancer:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - minitwitter-1
      - minitwitter-2

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
    - "11434:11434"
    volumes:
    - ./docker-data/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24
    
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:supersecret123@postgres:5432/minitwitter
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
      - SERVER_ROLE=worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - minitwitter-1
      - minitwitter-2
  
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus