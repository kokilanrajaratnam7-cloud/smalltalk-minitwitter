<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="css/style.css?v=1">
    <!-- Only needed if you want the social icons to render -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
</head>

<body>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="signupForm">
                <h1>Create Account</h1>
                <div class="social-container">
                    <!-- <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>-->
                    <!--a href="#" class="social"><i class="fab fa-google-plus-g"></i></a-->
                    <!--a href="#" class="social"><i class="fab fa-linkedin-in"></i></a-->
                </div>
                <!--span>or use your email for registration</span-->
                <input id="signupUsername" type="text" placeholder="Username" />
                <!--input type="email" placeholder="Email" /-->
                <input id="signupPassword" type="password" placeholder="Password" />
                <input id="signupConfirmPassword" type="password" placeholder="Confirm Password" />
                <!-- An element to toggle between password visibility -->
                <label style="display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 12px;">
                    <input type="checkbox" onclick="showPasswordSignUp()">
                    Show Password
                </label>
                <p id="signupMsg"></p>
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h1>Sign in</h1>
                <div class="social-container">
                    <!-- <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a-->
                </div>
                <!--span>or use your account</span-->
                <input id="loginUsername" type="text" placeholder="Username" />
                <input id="loginPassword" type="password" placeholder="Password" />
                <label style="display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 12px;">
                    <input type="checkbox" onclick="showPasswordSignIn()">
                    Show Password
                </label>
                <a href="#">Forgot your password?</a>
                <p id="loginMsg"></p>
                <button>Sign In</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <img src="assets/smalltalklogo.png" alt="Smalltalk Logo" class="logo">
                    <h1>Smalltalk</h1>
                    <span>Short thoughts. Real conversations.</span>
                    <p>Nice to see you again. Share the little things — without noise or pressure.</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <img src="assets/smalltalklogo.png" alt="Smalltalk Logo" class="logo">
                    <h1>Smalltalk</h1>
                    <span>Short thoughts. Real conversations.</span>
                    <p>A place for small updates and real voices. Say a little. Keep it simple.</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
